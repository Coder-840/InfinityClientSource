name: Build Infinity Web Client

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build-web-single-html:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'
      - name: Build TeaVM output
        run: ./gradlew clean teavmJS
      - name: Build single-file HTML
        run: |
          mkdir -p build/web
          python3 - <<'PY'
          from pathlib import Path
          js = Path('build/javascript/classes.js').read_text(encoding='utf-8')
          html = """<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Infinity Client 1.12.2</title><style>html,body,canvas{margin:0;width:100%;height:100%;overflow:hidden;background:#0a0d12}</style></head><body><canvas id='game_frame'></canvas><script>""" + js + """</script></body></html>"""
          Path('build/web/infinity-client-1.12.2.html').write_text(html, encoding='utf-8')
          PY
      - name: Compress single-file HTML
        run: |
          gzip -9 -k build/web/infinity-client-1.12.2.html
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: InfinityClient-Web
          path: |
            build/web/infinity-client-1.12.2.html
            build/web/infinity-client-1.12.2.html.gz
